<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Locação de Veículos</title>
  <script>
    (function () {
      var token = localStorage.getItem('token');
      if (token) {
        window.location.href = 'dashboard.html';
      } else {
        window.location.href = 'login.html';
      }
    })();
  </script>
</head>
<body>
  <p>Redirecionando...</p>
</body>
</html>
